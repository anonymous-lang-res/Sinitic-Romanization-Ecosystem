                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="h-full overflow-y-auto">
                    <div className="p-4 md:p-8 font-sans text-gray-900 box-border flex flex-col gap-6 max-w-5xl mx-auto min-h-full">
                        
                        <div className="pb-2 border-b border-gray-300 shrink-0">
                            <label className="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Document Name</label>
                            <input 
                                type="text" 
                                value={docName}
                                onChange={(e) => setDocName(e.target.value)}
                                className="text-3xl font-extrabold text-gray-800 bg-transparent border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 outline-none w-full transition-all py-1 placeholder-gray-300"
                                placeholder="输入标题..."
                            />
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col min-h-[300px]">
                            <div className="flex justify-between items-center mb-4 shrink-0">
                                <div className="flex items-center gap-4">
                                    <h3 className="text-lg font-bold text-gray-800 border-l-4 border-blue-500 pl-3">
                                        富文本编辑 (Rich Text)
                                    </h3>
                                    
                                    <div className="mode-switch">
                                        <button
                                            className={`mode-switch-option ${dataMode === '古音小镜' ? 'active' : ''}`}
                                            onClick={() => setDataMode('古音小镜')}
                                        >
                                            古音小镜
                                        </button>
                                        <button
                                            className={`mode-switch-option ${dataMode === '字音表' ? 'active' : ''}`}
                                            onClick={() => setDataMode('字音表')}
                                        >
                                            字音表
                                        </button>
                                    </div>
                                </div>
                                
                                <div className="flex items-center gap-3">
                                    <div className="text-xs text-gray-400 font-mono bg-gray-50 px-3 py-1 rounded-full border border-gray-100">
                                        Length: {charCount}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex-1 relative border border-gray-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-blue-100 focus-within:border-blue-500 transition-all bg-white mb-4">
                                <div
                                    ref={editorRef}
                                    contentEditable="true"
                                    onInput={handleInput}
                                    className="rich-editor w-full h-full p-4 outline-none text-base leading-relaxed text-gray-700 min-h-[200px]"
                                    data-placeholder={dataMode === '古音小镜' ? "在此处粘贴包含表格的网页内容..." : "在此处粘贴CSV格式的字音表数据（格式：汉字,声母,韵母,声调）..."}
                                    spellCheck="false"
                                ></div>
                            </div>

                            <div className="flex justify-end">
                                <button 
                                    onClick={processHtml}
                                    disabled={isProcessing}
                                    className={`px-6 py-2 rounded-lg font-bold text-white shadow-md transition-all flex items-center gap-2
                                        ${isProcessing ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 hover:shadow-lg active:transform active:scale-95'}
                                    `}
                                >
                                    {isProcessing ? (
                                        <span>处理中...</span>
                                    ) : (
                                        <>
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19.428 15.428a2 2 0 00-1.022-.547l-2.384-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                                            </svg>
                                            提取数据 (Extract)
                                        </>
                                    )}
                                </button>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col transition-all">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4 shrink-0">
                                <h3 className="text-lg font-bold text-gray-800 border-l-4 border-purple-500 pl-3">
                                    数据提取结果 (Extraction Results)
                                </h3>
                                
                                <div className="flex gap-3">
                                    <button
                                        onClick={enterOrganizer}
                                        className="px-4 py-1.5 text-sm font-bold rounded-md transition-all flex items-center gap-1 bg-green-600 text-white hover:bg-green-700 shadow-md hover:shadow-lg"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                                        </svg>
                                        音系与拼音整理
                                    </button>

                                    <div className="flex bg-gray-100 p-1 rounded-lg">
                                        <button 
                                            onClick={() => setViewMode('A')}
                                            className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all ${viewMode === 'A' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                        >
                                            模式 A
                                        </button>
                                        <button 
                                            onClick={() => setViewMode('B')}
                                            className={`px-4 py-1.5 text-sm font-medium rounded-md transition-all ${viewMode === 'B' ? 'bg-white text-blue-600 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                                        >
                                            模式 B
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div className="relative border border-gray-300 rounded-lg overflow-hidden bg-gray-900 text-gray-300 shadow-inner">
                                <div className="absolute top-0 left-0 right-0 h-8 bg-gray-800 border-b border-gray-700 flex items-center px-3 space-x-1.5 z-10">
                                    <div className="w-3 h-3 rounded-full bg-red-500"></div>
                                    <div className="w-3 h-3 rounded-full bg-yellow-500"></div>
                                    <div className="w-3 h-3 rounded-full bg-green-500"></div>
                                    <div className="ml-4 text-xs text-gray-500 font-mono">
                                        {extractionResult ? extractionResult.stats : "Ready"}
                                    </div>
                                </div>
                                
                                <pre className="p-4 pt-12 w-full h-80 overflow-auto text-sm font-mono leading-relaxed whitespace-pre-wrap break-all">
                                    {extractionResult ? (
                                        viewMode === 'A' 
                                            ? JSON.stringify(extractionResult.modeA, null, 2)
                                            : JSON.stringify(extractionResult.modeB, null, 2)
                                    ) : (
                                        <div className="flex flex-col items-center justify-center h-full text-gray-600 gap-2">
                                            <svg xmlns="http://www.w3.org/2000/svg" className="h-8 w-8 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 6h16M4 12h16m-7 6h7" />
                                            </svg>
                                            <span className="italic">{dataMode === '古音小镜' ? '请在上方粘贴表格并点击"提取数据"' : '请在上方粘贴CSV格式的字音表数据并点击"提取数据"'}</span>
                                        </div>
                                    )}
                                </pre>
                            </div>
                        </div>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RichEditor />);
    </script>
</body>
</html>
